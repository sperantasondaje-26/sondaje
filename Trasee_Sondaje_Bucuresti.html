<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Live Sondaje București</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; }
        .loading-pane {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; color: #333;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-pane">🔄 Se încarcă harta instant...</div>
    <div id="map"></div>

    <!-- BUTONUL PRETTY FORM CU CĂUTARE CONFIGURAT CORECT -->
    <div style="position: fixed; top: 10px; left: 60px; z-index:9999; font-size:14px; font-family: Arial, sans-serif;">
        <a href="https://prettyform.addxt.com/a/form/vf/1FAIpQLScUd4jDEQipGEj51LUQs_joFbZZWEM1qvy6lpmVHaSx4EtAkA" 
           target="_blank" 
           style="text-decoration: none; background-color: #0066cc; color: white; padding: 10px 18px; font-weight: bold; border-radius: 20px; box-shadow: 0px 4px 6px rgba(0,0,0,0.3); display: inline-block;">
           📝 Completează Formularul
        </a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwoOoysyhmE8RGtoUdwjHKLayuHxW9er_jJEIhkitCqqu7zCnJQWpncgBHKIYAi-vVzCw/exec?_cb=" + new Date().getTime();

        const map = L.map('map').setView([44.4396, 26.0963], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        async function incarcatDateLive() {
            try {
                let res = await fetch(SCRIPT_URL);
                let rows = await res.json();
                
                for (let rand of rows) {
                    if (rand.lat_start && rand.lat_final) {
                        let coordStart = [rand.lat_start, rand.lon_start];
                        let coordFinal = [rand.lat_final, rand.lon_final];

                        // Linie traseu echipe
                        L.polyline([coordStart, coordFinal], {color: 'red', weight: 5}).addTo(map).bindTooltip(`Echipa: ${rand.echipa}`);
                        
                        // Puncte Start și Final
                        L.marker(coordStart).addTo(map).bindPopup(`<b>Start:</b> ${rand.start}`);
                        L.marker(coordFinal).addTo(map).bindPopup(`<b>Final:</b> ${rand.final}`);

                        // Bulină portocalie pentru nevoi speciale
                        if (rand.nevoi && rand.nevoi.toString().trim() !== "") {
                            L.circleMarker(coordStart, {color: 'orange', radius: 10, fillOpacity: 0.8}).addTo(map)
                             .bindPopup(`<b>Echipa:</b> ${rand.echipa}<br><b>Nevoi:</b> ${rand.nevoi}<br><b>Rezultat:</b> ${rand.rezultat}`);
                        }
                    }
                }
            } catch (err) {
                console.error("Eroare:", err);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        incarcatDateLive();
    </script>
</body>
</html>
