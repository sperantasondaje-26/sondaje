        // 1. COORDONATE CORECTATE BISERICA LABIRINT 116
        const latCentru = 44.43088;
        const lngCentru = 26.11584;

        // Inițializare hartă centrată pe Labirint 116
        const map = L.map('map').setView([latCentru, lngCentru], 15);

        // Adăugare strat OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Marcaj pentru Biserica Labirint (Triunghiul de control repoziționat corect)
        // Folosim un polygon cu 3 puncte strânse în jurul centrului real pentru a desena triunghiul perfect
        const dimensiuneTriunghi = 0.0003; 
        const puncteTriunghi = [
            [latCentru + dimensiuneTriunghi, lngCentru], 
            [latCentru - dimensiuneTriunghi, lngCentru - dimensiuneTriunghi], 
            [latCentru - dimensiuneTriunghi, lngCentru + dimensiuneTriunghi]
        ];

        const triunghiCentru = L.polygon(puncteTriunghi, {
            color: 'red',
            fillColor: '#f03',
            fillOpacity: 0.5
        }).addTo(map).bindPopup("<b>Punct Central:</b> Biserica Labirint 116");

        // Cerc de perimetru pe o rază de 2.5 km în jurul punctului corectat
        const cercPerimetru = L.circle([latCentru, lngCentru], {
            color: 'blue',
            fillColor: '#30f',
            fillOpacity: 0.05,
            radius: 2500 // 2.5 km
