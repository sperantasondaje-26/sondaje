<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Trasee București - Foișor - Delea Veche - REPARAT</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        /* Setează înălțimea completă pentru corp și HTML */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }

        /* Container pentru panoul de control */
        #control-panel {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000; /* Asigură-te că este deasupra hărții */
            display: flex;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.9); /* Mai puțin transparent */
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Stil pentru butoane */
        .btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 12px 18px; /* Mai mari */
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        /* Culori pentru butoane */
        .btn-cazuri { background-color: #28a745; } /* Verde */
        .btn-strazi { background-color: #007bff; } /* Albastru */
        .btn-pagina { background-color: #343a40; } /* Gri închis */

        /* Efect de hover */
        .btn:hover { opacity: 0.9; }

        /* Efect de click */
        .btn:active { transform: translateY(1px); }

        /* Container pentru hartă */
        #map { height: 100%; width: 100%; z-index: 1; }
    </style>
</head>
<body>

    <div id="control-panel">
        <a href="#" class="btn btn-cazuri" id="btn-cazuri">
            <span class="icon">📋</span>
            Cazuri Speciale
        </a>
        <a href="#" class="btn btn-strazi" id="btn-strazi">
            <span class="icon">🏃</span>
            Toate Străzile
        </a>
        <a href="#" class="btn btn-pagina" id="btn-pagina">
            <span class="icon">🏠</span>
            Pagina Principală
        </a>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // Inițializează harta și setează centrul și zoom-ul
        var map = L.map('map').setView([44.4335, 26.1195], 14); // Coordonate pentru Foisorul de Foc, București

        // Adaugă stratul de hărți de bază (OpenStreetMap)
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Definește poliliniile PRECISE pentru trasee, care urmăresc străzile
        // Coordonate aproximative, dar care urmează drumurile din imagine
        var traseuMateiVoievod = L.polyline([
            [44.4331, 26.1132], // Start
            [44.4336, 26.1141],
            [44.4344, 26.1160],
            [44.4349, 26.1168],
            [44.4354, 26.1176], // Punct final spre Piața Iancului
            [44.4361, 26.1189]
        ], {color: 'blue', weight: 6, opacity: 0.6}).addTo(map);

        var traseuPopaNan = L.polyline([
            [44.4342, 26.1121], // De la Foișor spre sud
            [44.4345, 26.1123],
            [44.4348, 26.1127],
            [44.4350, 26.1132],
            [44.4352, 26.1136],
            [44.4356, 26.1147],
            [44.4359, 26.1158]  // Sud-est spre Delea veche
        ], {color: 'blue', weight: 6, opacity: 0.6}).addTo(map);

        var traseuZefirului = L.polyline([
            [44.4328, 26.1105], // Est din Traian
            [44.4329, 26.1110],
            [44.4331, 26.1118],
            [44.4332, 26.1122],
            [44.4333, 26.1129]  // Până în Popa Nan
        ], {color: 'blue', weight: 6, opacity: 0.6}).addTo(map);

        var traseuVișinilor = L.polyline([
            [44.4320, 26.1100], // Est din Traian
            [44.4321, 26.1106],
            [44.4323, 26.1114],
            [44.4325, 26.1121]  // Până în Popa Nan
        ], {color: 'blue', weight: 6, opacity: 0.6}).addTo(map);

        // Funcționalitate butoane
        document.getElementById('btn-cazuri').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Ați apăsat pe "Cazuri Speciale". Aici puteți adăuga logica pentru a afișa cazurile speciale pe hartă.');
        });

        document.getElementById('btn-strazi').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Ați apăsat pe "Toate Străzile". Aici puteți adăuga logica pentru a afișa toate străzile pe hartă.');
        });

        document.getElementById('btn-pagina').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Ați apăsat pe "Pagina Principală". Aici puteți adăuga logica pentru a naviga la pagina principală a aplicației.');
        });
    </script>
</body>
</html>
