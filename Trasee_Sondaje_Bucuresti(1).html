 <!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Live Sondaje București</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; }
        .loading-pane {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; color: #333;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-pane">🔄 Se încarcă rutele live din Google Sheets...</div>
    <div id="map"></div>

    <!-- BUTONUL DIN HARTĂ - ACUM CORECTAT PENTRU PRETTY FORMS -->
    <div style="position: fixed; top: 10px; left: 60px; z-index:9999; font-size:14px; font-family: Arial, sans-serif;">
        <a href="https://prettyform.addxt.com/a/form/vf/1FAIpQLScUd4jDEQipGEj51LUQs_joFbZZWEM1qvy6lpmVHaSx4EtAkA" 
           target="_blank" 
           style="text-decoration: none; background-color: #0066cc; color: white; padding: 10px 18px; font-weight: bold; border-radius: 20px; box-shadow: 0px 4px 6px rgba(0,0,0,0.3); display: inline-block;">
           📝 Completează Formularul
        </a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Link-ul tău live din Google Sheets Apps Script cu bypass cache
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwoOoysyhmE8RGtoUdwjHKLayuHxW9er_jJEIhkitCqqu7zCnJQWpncgBHKIYAi-vVzCw/exec?_cb=" + new Date().getTime();

        const map = L.map('map').setView([44.4396, 26.0963], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        async function geocode(address) {
            try {
                let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address + ", Bucuresti, Romania")}&limit=1`;
                let response = await fetch(url);
                let data = await response.json();
                if (data && data.length > 0) {
                    return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                }
            } catch (e) { console.error(e); }
            return null;
        }

        async function incarcatDateLive() {
            try {
                let res = await fetch(SCRIPT_URL);
                let rows = await res.json();
                
                for (let rand of rows) {
                    let startAddr = rand['Adresa_Start_Geocodare'];
                    let finalAddr = rand['Adresa_Final_Geocodare'];
                    let echipa = rand['Echipa ta '] || 'Echipă';
                    let nevoi = rand['Descriere nevoi'] || rand['Descriere  nevoi'] || '';
                    let rezultate = rand['Ce rezultate au fost pe aceasta strada'] || 'Sondaj efectuat';

                    if (startAddr && finalAddr) {
                        let coordStart = await geocode(startAddr);
                        await new Promise(r => setTimeout(r, 1000));
                        let coordFinal = await geocode(finalAddr);

                        if (coordStart && coordFinal) {
                            L.polyline([coordStart, coordFinal], {color: 'red', weight: 5}).addTo(map).bindTooltip(`Echipa: {echipa}`);
                            L.marker(coordStart).addTo(map).bindPopup(`<b>Start:</b> ${startAddr}`);
                            L.marker(coordFinal).addTo(map).bindPopup(`<b>Final:</b> ${finalAddr}`);

                            if (nevoi.toString().trim() !== "") {
                                L.circleMarker(coordStart, {color: 'orange', radius: 10, fillOpacity: 0.8}).addTo(map)
                                 .bindPopup(`<b>Echipa:</b> ${echipa}<br><b>Nevoi:</b> ${nevoi}<br><b>Rezultat:</b> ${rezultate}`);
                            }
                        }
                    }
                }
            } catch (err) {
                console.error("Eroare:", err);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        incarcatDateLive();
    </script>
</body>
</html>
