 <!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hartă Sondaje - Zona Labirint</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #loading-status {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 8px 12px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loading-status">Se încarcă și se colorează străzile...</div>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // COORDONATE CORECTATE PENTRU STRADA LABIRINT NR. 116
        const latCentru = 44.43125;
        const lngCentru = 26.11895;

        // Inițializare hartă
        const map = L.map('map').setView([latCentru, lngCentru], 15);

        // Adăugare strat OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Desenare TRIUNGHI ROȘU exact la nr. 116
        const d = 0.0002; // dimensiune vizuală
        const puncteTriunghi = [
            [latCentru + d, lngCentru], 
            [latCentru - d, lngCentru - d], 
            [latCentru - d, lngCentru + d]
        ];
        L.polygon(puncteTriunghi, {
            color: 'red',
            fillColor: '#f03',
            fillOpacity: 0.8,
            weight: 3
        }).addTo(map).bindPopup("<b>Punct de Pornire:</b> Str. Labirint 116");

        // Cerc perimetru de 2.5 km
        L.circle([latCentru, lngCentru], {
            color: 'blue',
            fillColor: '#30f',
            fillOpacity: 0.03,
            radius: 2500
        }).addTo(map);

        // BAZA TA DE DATE CU STRĂZI (DIACRITICE)
        const listaStrazi = [
            "Aleea Alexandru Moruzi, București, Romania",
            "Bulevardul Brătianu, București, Romania",
            "Bulevardul Burebista, București, Romania",

            "Bulevardul Decebal, București, Romania",

            "Bulevardul Unirii, București, Romania",
            "Calea Călărașilor, București, Romania",
            "Calea Dudești, București, Romania",
            "Calea Moșilor, București, Romania",
            "Calea Văcărești, București, Romania",

            "Intrare Kirițescu, București, Romania",
            "Intrare Olteni, București, Romania",
            "Intrare Parfumului, București, Romania",
            "Intrare Popa Radu, București, Romania",
            "Piața Alba Iulia, București, Romania",
            "Șoseaua Mihai Bravu, București, Romania",

            "Strada Baba Novac, București, Romania",
            "Strada Banul Udrea, București, Romania",

            "Strada Cauzași, București, Romania",
            "Strada Ceauș Radu, București, Romania",
            "Strada Constantin Kirițescu, București, Romania",
            "Strada Delea Nouă, București, Romania",
            "Strada Delea Veche, București, Romania",
            "Strada Dristorului, București, Romania",
            "Strada Foișorului, București, Romania",
            "Strada Gașpar Gorjan, București, Romania",
            "Strada Halelor, București, Romania",
            "Strada Hristos Botezătorul, București, Romania",
            "Strada Inocențiu Micu Klein, București, Romania",

            "Strada Sirenelor, București, Romania",
            "Strada Ștefan Mihăileanu, București, Romania",
            "Strada Teodor Speranția, București, Romania",
            "Strada Țepeș Vodă, București, Romania",
            "Strada Traian, București, Romania",
            "Strada Turturelelor, București, Romania",
            "Strada Udriște, București, Romania",
            "Strada Valeriu Braniște, București, Romania",
            "Strada Vișinilor, București, Romania",
            "Strada Vozilor, București, Romania",
            "Strada Ziduri Moși, București, Romania"
        ];

        // FUNCȚIE DE GEOLOCALIZARE ȘI COLORARE (Rulează controlat pentru a nu bloca serverul)
        let indexCurent = 0;

        function coloreazaUrmatoareaStrada() {
            if (indexCurent >= listaStrazi.length) {
                document.getElementById('loading-status').innerHTML = "Toate străzile au fost mapate!";
                setTimeout(() => document.getElementById('loading-status').style.display = 'none', 3000);
                return;
            }

            let numeStrada = listaStrazi[indexCurent];
            document.getElementById('loading-status').innerHTML = `Se colorează (${indexCurent + 1}/${listaStrazi.length}): ${numeStrada.split(',')[0]}`;

            // Căutare coordonate geometrice prin API-ul OpenStreetMap
            fetch(`https://nominatim.openstreetmap.org/search?format=json&polygon_geojson=1&q=${encodeURIComponent(numeStrada)}`)
                .then(response => response.json())
                .then(data => {
                    if (data && data.length > 0) {
                        let element = data[0];
                        // Dacă OpenStreetMap returnează linia/poligonul străzii, o desenăm colorată
                        if (element.geojson && (element.geojson.type === "LineString" || element.geojson.type === "MultiLineString")) {
                            L.geoJSON(element.geojson, {
                                style: {
                                    color: '#e67e22', // Culoare portocalie pentru trasee
                                    weight: 5,
                                    opacity: 0.85
                                }
                            }).addTo(map).bindPopup(`<b>${numeStrada.split(',')[0]}</b>`);
                        } else {
                            // Dacă găsește doar un punct (marker), punem un cerc mic colorat pe stradă
                            L.circle([parseFloat(element.lat), parseFloat(element.lon)], {
                                color: '#e67e22',
                                fillColor: '#e67e22',
                                fillOpacity: 0.8,
                                radius: 25
                            }).addTo(map).bindPopup(`<b>${numeStrada.split(',')[0]}</b>`);
                        }
                    }
                    
                    indexCurent++;
                    // Pauză de 1 secundă între străzi ca să nu fim blocați de serverul de hărți
                    setTimeout(coloreazaUrmatoareaStrada, 1000); 
                })
                .catch(error => {
                    console.log("Eroare la strada: " + numeStrada, error);
                    indexCurent++;
                    setTimeout(coloreazaUrmatoareaStrada, 1000);
                });
        }

        // Pornim colorarea automată după ce se încarcă harta
        setTimeout(coloreazaUrmatoareaStrada, 2000);

    </script>
</body>
</html>
