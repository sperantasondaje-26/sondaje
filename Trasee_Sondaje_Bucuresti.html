 <!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Live Sondaje București</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; }
        .loading-pane {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; color: #333;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-pane">🔄 Se încarcă harta live...</div>
    <div id="map"></div>

    <div style="position: fixed; top: 10px; left: 60px; z-index:9999; font-size:14px; font-family: Arial, sans-serif;">
        <a href="https://prettyform.addxt.com/a/form/vf/1FAIpQLScUd4jDEQipGEj51LUQs_joFbZZWEM1qvy6lpmVHaSx4EtAkA" 
           target="_blank" 
           style="text-decoration: none; background-color: #0066cc; color: white; padding: 10px 18px; font-weight: bold; border-radius: 20px; box-shadow: 0px 4px 6px rgba(0,0,0,0.3); display: inline-block;">
           📝 Completează Formularul
        </a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwoOoysyhmE8RGtoUdwjHKLayuHxW9er_jJEIhkitCqqu7zCnJQWpncgBHKIYAi-vVzCw/exec?_cb=" + new Date().getTime();

        const map = L.map('map').setView([44.4396, 26.0963], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        async function incarcatDateLive() {
            try {
                let res = await fetch(SCRIPT_URL);
                let elemente = await res.json();
                
                for (let elem of elemente) {
                    // Dacă elementul este traseul/linia străzii mari
                    if (elem.tip === "traseu" && elem.lat_start && elem.lat_final) {
                        let coordStart = [elem.lat_start, elem.lon_start];
                        let coordFinal = [elem.lat_final, elem.lon_final];

                        L.polyline([coordStart, coordFinal], {color: 'red', weight: 5}).addTo(map)
                         .bindTooltip(`Echipa: ${elem.echipa}`);
                        
                        L.marker(coordStart).addTo(map).bindPopup(`<b>Punct Plecare:</b> ${elem.start}`);
                        L.marker(coordFinal).addTo(map).bindPopup(`<b>Punct Final:</b> ${elem.final}`);
                    }
                    
                    // Dacă elementul este o adresă specifică cu interes/nevoi din cele 5 opțiuni
                    if (elem.tip === "punct_interes" && elem.lat) {
                        L.circleMarker([elem.lat, elem.lon], {
                            color: 'orange',
                            fillColor: '#ff9900',
                            fillOpacity: 0.9,
                            radius: 10
                        }).addTo(map).bindPopup(`
                            <b>📍 Caz Interes Semnalat</b><br>
                            <b>Echipa:</b> ${elem.echipa}<br>
                            <b>Adresă:</b> ${elem.adresa}<br>
                            <b>Nevoi/Note:</b> ${elem.nevoi}<br>
                            <b>Rezultat Străzi:</b> ${elem.rezultat}
                        `);
                    }
                }
            } catch (err) {
                console.error("Eroare la randare:", err);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        incarcatDateLive();
    </script>
</body>
</html>
