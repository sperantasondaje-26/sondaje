<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trasee Sondaje București</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Harta ocupă acum tot ecranul, să se vadă perfect pe telefon */
        .harta-container {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Bara fixă de jos cu butonul de acțiune */
        .zona-buton {
            background: #fff;
            padding: 15px;
            text-align: center;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
        }

        .buton-formular {
            display: inline-block;
            background-color: #0066cc;
            color: white;
            padding: 14px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }

        .buton-formular:hover {
            background-color: #004c99;
        }
    </style>
</head>
<body>

    <div class="harta-container">
        <iframe src="Trasee_Sondaje_Bucuresti.html"></iframe>
    </div>

    <div class="zona-buton">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScUd4jDEQipGEj51LUQs_joFbZZWEM1qvy6lpmVHaSx4EtAkA/viewform?usp=sharing" target="_blank" class="buton-formular">
            📝 Deschide Formularul de Completare
        </a>
    </div>

</body>
</html>
