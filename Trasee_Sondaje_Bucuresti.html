 <!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Trasee București</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        #btn-toggle-tabel {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background-color: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 25px;
            font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 8px;
        }
        #container-tabel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; z-index: 999; display: none; flex-direction: column; box-sizing: border-box;
        }
        .antet-tabel { padding: 15px; background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; }
        .antet-tabel h2 { margin: 0; font-size: 18px; color: #333; }
        .btn-inchide { background-color: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .zona-scroll { flex: 1; overflow-y: auto; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #dee2e6; padding: 12px 10px; text-align: left; vertical-align: top; }
        th { background-color: #343a40; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .incarcare { text-align: center; padding: 30px; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <button id="btn-toggle-tabel" onclick="deschideTabelul()">📋 Vezi Listă Cazuri</button>

    <div id="container-tabel">
        <div class="antet-tabel">
            <h2>📋 Cazuri Speciale Semnalate pe Teren</h2>
            <button class="btn-inchide" onclick="inchideTabelul()">✖ Închide</button>
        </div>
        <div class="zona-scroll">
            <table id="tabel-date">
                <thead>
                    <tr>
                        <th>Echipă</th>
                        <th>Adresă Caz</th>
                        <th>Interese / Nevoi</th>
                        <th>Observații Specifice</th>
                    </tr>
                </thead>
                <tbody id="corp-tabel">
                    <tr>
                        <td colspan="4" class="incarcare">Se încarcă datele direct din Google Sheets...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const idTabelGoogle = '1O_XyQKzPOYiYGx7RPgJ-s6wl88c-YCmmUDGCf3RkOuQ'; 
        const urlCsv = `https://docs.google.com/spreadsheets/d/${idTabelGoogle}/export?format=csv&gid=206187394`;

        let harta;

        document.addEventListener("DOMContentLoaded", function() {
            harta = L.map('map').setView([44.4396, 26.0963], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(harta);
            incarcaDateDirect();
        });

        function deschideTabelul() { document.getElementById('container-tabel').style.display = 'flex'; }
        function inchideTabelul() { document.getElementById('container-tabel').style.display = 'none'; }

        function incarcaDateDirect() {
            fetch(urlCsv)
                .then(response => response.text())
                .then(text => {
                    let linii = proceseazaCsv(text);
                    popeazaTabelDinCsv(linii);
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('corp-tabel').innerHTML = `<tr><td colspan="4" style="color:red; text-align:center;">Eroare de conexiune.</td></tr>`;
                });
        }

        function proceseazaCsv(text) {
            let linii = [];
            let randuri = text.split("\n");
            if(randuri.length === 0) return linii;

            // Curățăm antetul și transformăm în caractere mici pentru potrivire exactă
            let antet = randuri[0].split(",").map(h => h.trim().toLowerCase());
            
            let idxEchipa = antet.findIndex(el => el.includes("echipa ta"));
            let idxStrada = antet.findIndex(el => el.includes("alege o strada"));
            
            // Definim configurările pentru toate cele 4 cazuri din tabel
            let configuratiiCazuri = [
                { addr: "nr adresa caz 1", nevoi: "descriere nevoi caz 1", obs: "observatii caz 1" },
                { addr: "nr adresa caz 2", nevoi: "descriere nevoi caz 2", obs: "observatii caz 2" },
                { addr: "nr adresa caz 3", nevoi: "descriere nevoi caz 3", obs: "observatii caz 3" },
                { addr: "nr adresa caz 4", nevoi: "descriere nevoi 4",     obs: "observatii caz 4" }
            ];

            let indiciCazuri = configuratiiCazuri.map(c => {
                return {
                    idxAddr: antet.findIndex(el => el.includes(c.addr)),
                    idxNevoi: antet.findIndex(el => el.includes(c.nevoi)),
                    idxObs: antet.findIndex(el => el.includes(c.obs))
                };
            });

            for (let i = 1; i < randuri.length; i++) {
                if (!randuri[i].trim()) continue;
                
                // Spargere corectă a celulelor CSV, ignorând virgulele din interiorul ghilimelelor
                let celule = randuri[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                
                let echipa = celule[idxEchipa] || "-";
                let strada = celule[idxStrada] || "";

                if (!strada || strada.toLowerCase().includes("alege o strada")) continue;

                // Verificăm pe rând cele 4 cazuri din rândul curent
                indiciCazuri.forEach(cazIdx => {
                    if (cazIdx.idxAddr !== -1 && celule[cazIdx.idxAddr]) {
                        let numarAdresa = celule[cazIdx.idxAddr];
                        let textNevoi = cazIdx.idxNevoi !== -1 ? celule[cazIdx.idxNevoi] : "";
                        let textObs = cazIdx.idxObs !== -1 ? celule[cazIdx.idxObs] : "";

                        if (numarAdresa && numarAdresa.trim() !== "") {
                            linii.push({
                                echipa: echipa,
                                adresa: strada + ", Nr. " + numarAdresa,
                                nevoi: textNevoi.trim() || "Interes semnalat",
                                observatii: textObs.trim() || "-"
                            });
                        }
                    }
                });
            }
            return linii;
        }

        function popeazaTabelDinCsv(cazuri) {
            const corp = document.getElementById('corp-tabel');
            corp.innerHTML = "";

            if (cazuri.length === 0) {
                corp.innerHTML = `<tr><td colspan="4" class="incarcare">Nu s-au găsit cazuri speciale înregistrate în baza de date.</td></tr>`;
                return;
            }

            cazuri.forEach(caz => {
                let rand = document.createElement('tr');
                rand.innerHTML = `
                    <td style="font-weight:bold; color:#0056b3;">${caz.echipa}</td>
                    <td>${caz.adresa}</td>
                    <td>${caz.nevoi}</td>
                    <td style="background-color: #fffdf0; font-style: italic;">${caz.observatii}</td>
                `;
                corp.appendChild(rand);
            });
        }
    </script>
</body>
</html>
