 <!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Trasee București</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f6f9; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .grup-butoane {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; width: 95%; max-width: 600px;
        }
        .btn-meniu {
            background-color: #28a745; color: white; padding: 10px 14px; border: none; border-radius: 20px;
            font-weight: bold; font-size: 13px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-decoration: none; text-align: center; display: inline-flex; align-items: center; justify-content: center;
            min-width: 110px; flex: 1;
        }
        .btn-strazi { background-color: #007bff; }
        .btn-inapoi { background-color: #343a40; }

        .container-ecran {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; z-index: 1050; display: none; flex-direction: column; box-sizing: border-box;
        }
        .antet-fereastra { padding: 15px; background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; }
        .antet-fereastra h2 { margin: 0; font-size: 16px; color: #333; }
        .btn-inchide { background-color: #dc3545; color: white; border: none; padding: 8px 14px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .zona-scroll { flex: 1; overflow-y: auto; padding: 12px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #dee2e6; padding: 10px 8px; text-align: left; vertical-align: top; }
        th { background-color: #343a40; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        
        .lista-strazi { list-style-type: none; padding: 0; margin: 0; }
        .lista-strazi li { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #222; display: flex; align-items: center; gap: 8px; }
        .lista-strazi li::before { content: "🛣️"; }
        
        .incarcare { text-align: center; padding: 30px; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <div class="grup-butoane">
        <button class="btn-meniu" onclick="deschideCazuriSecurizat()">📋 Cazuri Speciale</button>
        <button class="btn-meniu btn-strazi" onclick="deschideFereastra('container-strazi')">🚶 Toate Străzile</button>
        <a href="index.html" class="btn-meniu btn-inapoi">🏠 Pagina Principală</a>
    </div>

    <div id="container-tabel" class="container-ecran">
        <div class="antet-fereastra">
            <h2>📋 Cazuri Speciale Semnalate pe Teren</h2>
            <button class="btn-inchide" onclick="inchideToate()">✖ Închide</button>
        </div>
        <div class="zona-scroll">
            <table id="tabel-date">
                <thead>
                    <tr>
                        <th>Echipă</th>
                        <th>Adresă Caz</th>
                        <th>Interese / Nevoi</th>
                        <th>Observații</th>
                    </tr>
                </thead>
                <tbody id="corp-tabel">
                    <tr><td colspan="4" class="incarcare">Se încarcă datele...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="container-strazi" class="container-ecran">
        <div class="antet-fereastra">
            <h2>🚶 Listă Străzi Parcurse (Istoric)</h2>
            <button class="btn-inchide" onclick="inchideToate()">✖ Închide</button>
        </div>
        <div class="zona-scroll">
            <ul id="lista-strazi-parcurse" class="lista-strazi">
                <li class="incarcare">Se generează lista străzilor...</li>
            </ul>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        const idTabelGoogle = '1O_XyQKzPOYiYGx7RPgJ-s6wl88c-YCmmUDGCf3RkOuQ'; 
        const urlCsv = `https://docs.google.com/spreadsheets/d/${idTabelGoogle}/export?format=csv&gid=206187394`;
        const parolaCorecta = 'titughejan@2026';

        let harta;
        let straziUniceSet = new Set();
        let straturiLiniiIncarcate = {};

        document.addEventListener("DOMContentLoaded", function() {
            harta = L.map('map').setView([44.4335, 26.1195], 14); 
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(harta);
            incarcaDateDirect();
        });

        function deschideCazuriSecurizat() {
            let introducere = prompt("Introduceți parola pentru a vizualiza cazurile speciale:");
            if (introducere === parolaCorecta) {
                deschideFereastra('container-tabel');
            } else if (introducere !== null) {
                alert("Parolă incorectă! Accesul a fost refuzat.");
            }
        }

        function deschideFereastra(id) {
            inchideToate();
            document.getElementById(id).style.display = 'flex';
        }
        function inchideToate() {
            document.getElementById('container-tabel').style.display = 'none';
            document.getElementById('container-strazi').style.display = 'none';
        }

        function incarcaDateDirect() {
            fetch(urlCsv + "&t=" + new Date().getTime())
                .then(response => response.text())
                .then(text => {
                    Papa.parse(text, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            proceseazaDateObiecte(results.data);
                        }
                    });
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('corp-tabel').innerHTML = `<tr><td colspan="4" style="color:red; text-align:center;">Eroare de rețea.</td></tr>`;
                });
        }

        function proceseazaDateObiecte(obiecteRanduri) {
            if (obiecteRanduri.length === 0) return;

            let chei = Object.keys(obiecteRanduri[0]);
            let colEchipa = chei.find(k => /echipa/i.test(k));
            let colStrada = chei.find(k => /strada|alege/i.test(k));

            let colCazNr1 = chei.find(k => /nr.*adresa.*caz.*1/i.test(k));
            let colCazNevoi1 = chei.find(k => /descriere.*nevoi.*caz.*1/i.test(k));
            
            let colCazNr2 = chei.find(k => /nr.*adresa.*caz.*2/i.test(k));
            let colCazNevoi2 = chei.find(k => /descriere.*nevoi.*caz.*2/i.test(k));
            let colCazObs2 = chei.find(k => /observatii.*2/i.test(k));

            let colCazNr3 = chei.find(k => /nr.*adresa.*caz.*3/i.test(k));

            let corpTabel = document.getElementById('corp-tabel');
            corpTabel.innerHTML = "";
            straziUniceSet.clear();

            let areCazuri = false;

            obiecteRanduri.forEach(randDate => {
                let echipa = randDate[colEchipa] || "-";
                let stradaRaw = randDate[colStrada] || "";

                if (!stradaRaw || stradaRaw.toLowerCase().includes("alege o strada") || stradaRaw === "-") return;

                let numeStradaCurat = stradaRaw.split(',')[0].trim();
                if (numeStradaCurat) {
                    straziUniceSet.add(numeStradaCurat);
                }

                let arrayCazuri = [];
                if (colCazNr1 && randDate[colCazNr1] && randDate[colCazNr1] !== "-") {
                    arrayCazuri.push({ nr: randDate[colCazNr1], nevoi: randDate[colCazNevoi1], obs: "" });
                }
                if (colCazNr2 && randDate[colCazNr2] && randDate[colCazNr2] !== "-") {
                    arrayCazuri.push({ nr: randDate[colCazNr2], nevoi: randDate[colCazNevoi2], obs: randDate[colCazObs2] });
                }
                if (colCazNr3 && randDate[colCazNr3] && randDate[colCazNr3] !== "-") {
                    arrayCazuri.push({ nr: randDate[colCazNr3], nevoi: "", obs: "" });
                }

                if (arrayCazuri.length > 0) {
                    areCazuri = true;
                    arrayCazuri.forEach(caz => {
                        let tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="font-weight:bold; color:#0056b3;">${echipa}</td>
                            <td>${numeStradaCurat}, Nr. ${caz.nr}</td>
                            <td>${caz.nevoi || "-"}</td>
                            <td style="background-color: #fffdf0; font-style: italic;">${caz.obs || "-"}</td>
                        `;
                        corpTabel.appendChild(tr);
                    });
                }
            });

            if (!areCazuri) {
                corpTabel.innerHTML = `<tr><td colspan="4" class="incarcare">Nu sunt cazuri speciale înregistrate.</td></tr>`;
            }

            popeazaListaStrazi();
            deseneazaToateTraseelePoligonaleReale();
        }

        function popeazaListaStrazi() {
            const containerLista = document.getElementById('lista-strazi-parcurse');
            containerLista.innerHTML = "";

            if (straziUniceSet.size === 0) {
                containerLista.innerHTML = `<li class="incarcare">Nicio stradă nu a fost parcursă încă.</li>`;
                return;
            }

            let straziSortate = Array.from(straziUniceSet).sort((a, b) => a.localeCompare(b));
            straziSortate.forEach(strada => {
                let li = document.createElement('li');
                li.innerHTML = `<strong>${strada}</strong>`;
                containerLista.appendChild(li);
            });
        }

        // 🧠 REVENIRE LA SOLUȚIA INTELIGENTĂ: Satelitul desenează live formele corecte, direct pe drum
        function deseneazaToateTraseelePoligonaleReale() {
            straziUniceSet.forEach(strada => {
                if (straturiLiniiIncarcate[strada]) return;

                // Curăță cuvintele ajutătoare pentru a trimite interogarea curată (ex: "Stefan Mihaileanu")
                let doarNumele = strada.replace(/strada|bulevardul|calea|intrare|aleea/i, '').trim();

                let queryOverpass = `[out:json][timeout:25];
                    area["name"="București"]->.searchArea;
                    (
                      way["name"~"${doarNumele}", i](area.searchArea);
                    );
                    out body; >; out skel qt;`;

                let urlApi = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(queryOverpass);

                fetch(urlApi)
                    .then(res => res.json())
                    .then(data => {
                        if (!data.elements || data.elements.length === 0) return;

                        let noduri = {};
                        data.elements.forEach(el => {
                            if (el.type === 'node') {
                                noduri[el.id] = [el.lat, el.lon];
                            }
                        });

                        let liniiStradaGrup = [];

                        data.elements.forEach(el => {
                            if (el.type === 'way' && el.nodes) {
                                let puncteTraseuReal = [];
                                el.nodes.forEach(nodeId => {
                                    if (noduri[nodeId]) {
                                        puncteTraseuReal.push(noduri[nodeId]);
                                    }
                                });

                                if (puncteTraseuReal.length > 0) {
                                    // Linie roșie semi-transparentă care merge STRICT pe stradă, nu prin case
                                    let liniePoligonalatransport = L.polyline(puncteTraseuReal, {
                                        color: '#dc2626',    // Roșu aprins, excelent la lumina zilei
                                        weight: 6,           // Grosime perfectă
                                        opacity: 0.45,       // Se vede textul străzii dedesubt
                                        lineJoin: 'round',
                                        lineCap: 'round'
                                    }).addTo(harta);

                                    liniePoligonalatransport.bindPopup(`<b>🛣️ ${strada}</b><br><span style="color:green;font-weight:bold;">Traseu corelat geografic!</span>`);
                                    liniiStradaGrup.push(liniePoligonalatransport);
                                }
                            }
                        });

                        if(liniiStradaGrup.length > 0) {
                            straturiLiniiIncarcate[strada] = liniiStradaGrup;
                        }
                    })
                    .catch(e => console.error("Eroare la descărcarea geometriei pentru: " + strada, e));
            });
        }
    </script>
</body>
</html>
