<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=device-width, initial-scale=1.0">
    <title>Harta Trasee București</title>
    <!-- Stiluri Leaflet pentru Hartă -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Butonul Verde - Centralizat Sus */
        #btn-toggle-tabel {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background-color: #28a745;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        #btn-toggle-tabel:active { transform: translateX(-50%) scale(0.97); }

        /* Panoul cu Tabelul de Cazuri */
        #container-tabel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: white;
            z-index: 999;
            display: none;
            flex-direction: column;
            box-sizing: border-box;
        }
        .antet-tabel {
            padding: 15px;
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .antet-tabel h2 { margin: 0; font-size: 18px; color: #333; }
        .btn-inchide {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .zona-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 12px 10px;
            text-align: left;
            vertical-align: top;
        }
        th { background-color: #343a40; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        
        .incarcare { text-align: center; padding: 30px; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <!-- Butonul de acces la tabel -->
    <button id="btn-toggle-tabel" onclick="deschideTabelul()">📋 Vezi Listă Cazuri</button>

    <!-- Structura tabelului ascuns -->
    <div id="container-tabel">
        <div class="antet-tabel">
            <h2>📋 Cazuri Speciale Semnalate pe Teren</h2>
            <button class="btn-inchide" onclick="inchideTabelul()">✖ Închide</button>
        </div>
        <div class="zona-scroll">
            <table id="tabel-date">
                <thead>
                    <tr>
                        <th>Echipă</th>
                        <th>Adresă Caz</th>
                        <th>Interese / Nevoi</th>
                        <th>Observații Specifice</th>
                    </tr>
                </thead>
                <tbody id="corp-tabel">
                    <tr>
                        <td colspan="4" class="incarcare">Se încarcă datele din Google Sheets...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Harta de fundal -->
    <div id="map"></div>

    <!-- Scripturi Leaflet și Logica de conectare -->
    <script href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Legătura cu Apps Script-ul tău cel nou, complet și curățat
        const urlWebApp = 'https://script.google.com/macros/s/AKfycbxqyEuhn1IRuwj-fqFVb3tn4NMpVBoOTVygl3qqyAT6N0KXlQLTKa6JVYf_BSlJ1ZI2yw/exec';

        let dateSalvate = [];
        let harta;

        // Inițializare Hartă Standard pe București
        document.addEventListener("DOMContentLoaded", function() {
            harta = L.map('map').setView([44.4396, 26.0963], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(harta);
            
            incarcaDateleSistemului();
        });

        function deschideTabelul() {
            document.getElementById('container-tabel').style.display = 'flex';
        }

        function inchideTabelul() {
            document.getElementById('container-tabel').style.display = 'none';
        }

        // Descarcă datele din scriptul Google
        function incarcaDateleSistemului() {
            fetch(urlWebApp)
                .then(response => response.json())
                .then(data => {
                    dateSalvate = data;
                    popeazaTabelCazuri(data);
                    deseneazaHartaElemente(data);
                })
                .catch(err => {
                    console.error("Eroare incarcare:", err);
                    document.getElementById('corp-tabel').innerHTML = `<tr><td colspan="4" style="color:red; text-align:center;">Eroare la conectarea cu Google Sheets. Reîncărcați pagina.</td></tr>`;
                });
        }

        // Construiește rândurile în mod automat sub formă de tabel curat
        function popeazaTabelCazuri(elemente) {
            const corp = document.getElementById('corp-tabel');
            corp.innerHTML = ""; // Ștergem mesajul de încărcare

            // Filtrăm doar punctele de interes care reprezintă cazurile completate
            const cazuri = elemente.filter(el => el.tip === "punct_interes");

            if (cazuri.length === 0) {
                corp.innerHTML = `<tr><td colspan="4" class="incarcare">Nu s-au găsit cazuri speciale înregistrate în baza de date.</td></tr>`;
                return;
            }

            cazuri.forEach(caz => {
                let rând = document.createElement('tr');
                
                // Procesăm textul pentru a separa Nevoile de Observații din separatorul „| Obs:”
                let parti = caz.nevoi.split(" | Obs: ");
                let nevoiText = parti[0] || "";
                let observatiiText = parti[1] || "-";

                // Curățăm adresa de textul final de geocodare pentru aspect vizual frumos
                let adresaAfisata = caz.adresa.replace(", bucuresti, romania", "").replace(", Bucuresti, Romania", "");

                rând.innerHTML = `
                    <td style="font-weight:bold; color:#0056b3;">${caz.echipa}</td>
                    <td>${adresaAfisata}</td>
                    <td>${nevoiText}</td>
                    <td style="background-color: #fffdf0; font-style: italic;">${observatiiText}</td>
                `;
                corp.appendChild(rând);
            });
        }

        // Desenează punctele și liniile pe hartă în funcție de geocodare
        function deseneazaHartaElemente(elemente) {
            elemente.forEach(el => {
                if (el.tip === "traseu" && el.lat_start && el.lon_start && el.lat_final && el.lon_final) {
                    L.polyline([[el.lat_start, el.lon_start], [el.lat_final, el.lon_final]], {
                        color: 'red', weight: 4, opacity: 0.8
                    }).addTo(harta).bindPopup(`<b>Echipă:</b> ${el.echipa}<br><b>Traseu activat</b>`);
                } 
                else if (el.tip === "punct_interes" && el.lat && el.lon) {
                    L.circleMarker([el.lat, el.lon], {
                        radius: 8, fillColor: 'blue', color: '#000', weight: 1, fillOpacity: 0.8
                    }).addTo(harta).bindPopup(`<b>Echipă:</b> ${el.echipa}<br><b>Adresă:</b> ${el.adresa}`);
                }
            });
        }
    </script>
</body>
</html>
