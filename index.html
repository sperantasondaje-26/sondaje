  <!DOCTYPE html>
<html lang="ro">
<head>

    <title>Sondaje Speranța</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .meniu-container {
            text-align: center;
            background: #ffffff;
            padding: 35px 25px;

        }

        .logo-speranta {
            max-width: 180px;
            height: auto;
            margin-bottom: 15px;
        }

        h1 {
            color: #1565c0;
            font-size: 26px;
            margin-top: 0;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        p {
            color: #666666;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .buton {
            display: block;
            text-decoration: none;
            color: white;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }

        .buton:active {
            transform: scale(0.97);
        }

        .btn-harta {
            background-color: #2e7d32;
        }
        .btn-harta:hover {
            background-color: #1b5e20;
        }

        .btn-formular {
            background-color: #0288d1;
        }
        .btn-formular:hover {

</head>
