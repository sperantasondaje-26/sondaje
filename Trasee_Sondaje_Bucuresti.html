 <!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Trasee București</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f6f9; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .grup-butoane {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; width: 95%; max-width: 600px;
        }
        .btn-meniu {
            background-color: #28a745; color: white; padding: 10px 14px; border: none; border-radius: 20px;
            font-weight: bold; font-size: 13px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-decoration: none; text-align: center; display: inline-flex; align-items: center; justify-content: center;
            min-width: 110px; flex: 1;
        }
        .btn-strazi { background-color: #007bff; }
        .btn-inapoi { background-color: #343a40; }

        .container-ecran {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; z-index: 1050; display: none; flex-direction: column; box-sizing: border-box;
        }
        .antet-fereastra { padding: 15px; background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; }
        .antet-fereastra h2 { margin: 0; font-size: 16px; color: #333; }
        .btn-inchide { background-color: #dc3545; color: white; border: none; padding: 8px 14px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .zona-scroll { flex: 1; overflow-y: auto; padding: 12px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #dee2e6; padding: 10px 8px; text-align: left; vertical-align: top; }
        th { background-color: #343a40; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        
        .lista-strazi { list-style-type: none; padding: 0; margin: 0; }
        .lista-strazi li { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #222; display: flex; align-items: center; gap: 8px; }
        .lista-strazi li::before { content: "🛣️"; }
        
        .incarcare { text-align: center; padding: 30px; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <div class="grup-butoane">
        <button class="btn-meniu" onclick="deschideCazuriSecurizat()">📋 Cazuri Speciale</button>
        <button class="btn-meniu btn-strazi" onclick="deschideFereastra('container-strazi')">🚶 Toate Străzile</button>
        <a href="index.html" class="btn-meniu btn-inapoi">🏠 Pagina Principală</a>
    </div>

    <div id="container-tabel" class="container-ecran">
        <div class="antet-fereastra">
            <h2>📋 Cazuri Speciale Semnalate pe Teren</h2>
            <button class="btn-inchide" onclick="inchideToate()">✖ Închide</button>
        </div>
        <div class="zona-scroll">
            <table id="tabel-date">
                <thead>
                    <tr>
                        <th>Echipă</th>
                        <th>Adresă Caz</th>
                        <th>Interese / Nevoi</th>
                        <th>Observații</th>
                    </tr>
                </thead>
                <tbody id="corp-tabel">
                    <tr><td colspan="4" class="incarcare">Se încarcă datele...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="container-strazi" class="container-ecran">
        <div class="antet-fereastra">
            <h2>🚶 Listă Străzi Parcurse (Istoric)</h2>
            <button class="btn-inchide" onclick="inchideToate()">✖ Închide</button>
        </div>
        <div class="zona-scroll">
            <ul id="lista-strazi-parcurse" class="lista-strazi">
                <li class="incarcare">Se generează lista străzilor...</li>
            </ul>
        </div>
    </div>

    <div id="map"></div>

        const parolaCorecta = 'titughejan@2026';

        let harta;
        let straziUniceSet = new Set();
        let vectorLiniiInstalate = [];

            "corneliu coposu": [[44.43121, 26.10421], [44.42952, 26.11181]],
            "octavian goga": [[44.42521, 26.11421], [44.42312, 26.12651]],
            "mircea voda": [[44.42981, 26.10921], [44.42122, 26.11351]],
            "burebista": [[44.42451, 26.12721], [44.42322, 26.13451]],
            "visinilor": [[44.43202, 26.11005], [44.43225, 26.11145], [44.43251, 26.11215]],
            "zefirului": [[44.43281, 26.11051], [44.43312, 26.11182], [44.43332, 26.11291]]
        };

        document.addEventListener("DOMContentLoaded", function() {
            harta = L.map('map').setView([44.4335, 26.1195], 14); 
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(harta);
            incarcaDateDirect();
        });

        function deschideCazuriSecurizat() {
            let introducere = prompt("Introduceți parola pentru a vizualiza cazurile speciale:");
            if (introducere === parolaCorecta) {
                deschideFereastra('container-tabel');
            } else if (introducere !== null) {
                alert("Parolă incorectă! Accesul a fost refuzat.");
            }
        }

        function deschideFereastra(id) {
            inchideToate();
            document.getElementById(id).style.display = 'flex';
        }
        function inchideToate() {
            document.getElementById('container-tabel').style.display = 'none';
            document.getElementById('container-strazi').style.display = 'none';
        }

        function incarcaDateDirect() {
            fetch(urlCsv + "&t=" + new Date().getTime())
                .then(response => response.text())
                .then(text => {
                    proceseazaCsvExcel(text);
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('corp-tabel').innerHTML = `<tr><td colspan="4" style="color:red; text-align:center;">Eroare la citirea datelor.</td></tr>`;
                });
        }

        function proceseazaCsvExcel(text) {
            let randuri = text.split(/\r?\n/);
            if(randuri.length <= 1) return;

            let antetRaw = randuri[0].split(",");
            
            let idxEchipa = antetRaw.findIndex(el => /echipa/i.test(el));
            let idxStrada = antetRaw.findIndex(el => /strada|alege/i.test(el)); 

            let idxCazNr1 = antetRaw.findIndex(el => /nr.*adresa.*caz.*1/i.test(el));
            let idxCazNevoi1 = antetRaw.findIndex(el => /descriere.*nevoi.*caz.*1/i.test(el));
            
            let idxCazNr2 = antetRaw.findIndex(el => /nr.*adresa.*caz.*2/i.test(el));
            let idxCazNevoi2 = antetRaw.findIndex(el => /descriere.*nevoi.*caz.*2/i.test(el));
            let idxCazObs2 = antetRaw.findIndex(el => /observatii.*2/i.test(el));

            let idxCazNr3 = antetRaw.findIndex(el => /nr.*adresa.*caz.*3/i.test(el));

            let corpTabel = document.getElementById('corp-tabel');
            corpTabel.innerHTML = "";
            straziUniceSet.clear();

            let areCazuri = false;

            for (let i = 1; i < randuri.length; i++) {
                if (!randuri[i].trim()) continue;
                
                let celule = randuri[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                
                let echipa = celule[idxEchipa] || "-";
                let strada = celule[idxStrada] || "";

                if (!strada || strada.toLowerCase().includes("alege o strada") || strada === "-") continue;

                // Curățăm denumirea brută introdusă pentru a o afișa frumos în listă
                let numeStradaCurat = strada.split(',')[0].trim();
                if(numeStradaCurat) {
                    straziUniceSet.add(numeStradaCurat);
                }

                let dateCazuriPeRand = [];
                if (idxCazNr1 !== -1 && celule[idxCazNr1] && celule[idxCazNr1] !== "-") {
                    dateCazuriPeRand.push({ nr: celule[idxCazNr1], nevoi: celule[idxCazNevoi1], obs: "" });
                }
                if (idxCazNr2 !== -1 && celule[idxCazNr2] && celule[idxCazNr2] !== "-") {
                    dateCazuriPeRand.push({ nr: celule[idxCazNr2], nevoi: celule[idxCazNevoi2], obs: celule[idxCazObs2] });
                }
                if (idxCazNr3 !== -1 && celule[idxCazNr3] && celule[idxCazNr3] !== "-") {
                    dateCazuriPeRand.push({ nr: celule[idxCazNr3], nevoi: "", obs: "" });
                }

                if (dateCazuriPeRand.length > 0) {
                    areCazuri = true;
                    dateCazuriPeRand.forEach(caz => {
                        let rand = document.createElement('tr');
                        rand.innerHTML = `
                            <td style="font-weight:bold; color:#0056b3;">${echipa}</td>
                            <td>${numeStradaCurat}, Nr. ${caz.nr}</td>
                            <td>${caz.nevoi || "-"}</td>
                            <td style="background-color: #fffdf0; font-style: italic;">${caz.obs || "-"}</td>
                        `;
                        corpTabel.appendChild(rand);
                    });
                }
            }

            if (!areCazuri) {
                corpTabel.innerHTML = `<tr><td colspan="4" class="incarcare">Nu sunt cazuri speciale înregistrate.</td></tr>`;
            }

            popeazaListaStrazi();
            deseneazaTraseeInstanteFaraInternet();
        }

        function popeazaListaStrazi() {
            const containerLista = document.getElementById('lista-strazi-parcurse');
            containerLista.innerHTML = "";

            if (straziUniceSet.size === 0) {
                containerLista.innerHTML = `<li class="incarcare">Nicio stradă nu a fost parcursă încă.</li>`;
                return;
            }

            let straziSortate = Array.from(straziUniceSet).sort((a, b) => a.localeCompare(b));
            straziSortate.forEach(strada => {
                let li = document.createElement('li');
                li.innerHTML = `<strong>${strada}</strong>`;
                containerLista.appendChild(li);
            });
        }

        // ⚡ NOUA LOGICĂ DE SARCINĂ PARTIALĂ (Filtrare inteligentă text brut din Google Sheets)
        function deseneazaTraseeInstanteFaraInternet() {
            vectorLiniiInstalate.forEach(linie => harta.removeLayer(linie));
            vectorLiniiInstalate = [];

            straziUniceSet.forEach(stradaInregistrata => {
                // Scoaterea diacriticelor și transformarea în litere mici pentru textul din Sheets
                let textBrutCurat = stradaInregistrata.toLowerCase()
                                                     .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                                                     .trim();

                // Căutăm dacă oricare dintre cheile noastre din dicționar se regăsește în textul din Sheets
                for (let cheieDictionar in bazeGeometriceStrazi) {
                    if (textBrutCurat.includes(cheieDictionar)) {
                        let punctePoligonaleReale = bazeGeometriceStrazi[cheieDictionar];
                        
                        let linieRosie = L.polyline(punctePoligonaleReale, {
                            color: '#dc2626',   // Roșu intens
                            weight: 6,          // Grosime perfectă
                            opacity: 0.5,       // Semi-transparent ca să se vadă numele străzii dedesubt
                            lineJoin: 'round',
                            lineCap: 'round'
                        }).addTo(harta);

                        linieRosie.bindPopup(`<b>🛣️ ${stradaInregistrata}</b><br><span style="color:green;font-weight:bold;">Traseu corelat din Sheets!</span>`);
                        vectorLiniiInstalate.push(linieRosie);
                        break; // Am găsit potrivirea pentru această stradă, trecem la următoarea
                    }
                }
            });
        }
    </script>
</body>
</html>
