 <!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Trasee București - Foisor - Delea Veche</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        /* Setează înălțimea completă pentru corp și HTML */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }

        /* Container pentru panoul de control */
        #control-panel {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000; /* Asigură-te că este deasupra hărții */
            display: flex;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Stil pentru butoane */
        .btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        /* Culori pentru butoane */
        .btn-cazuri { background-color: #28a745; } /* Verde */
        .btn-strazi { background-color: #007bff; } /* Albastru */
        .btn-pagina { background-color: #343a40; } /* Gri închis */

        /* Efect de hover */
        .btn:hover { opacity: 0.85; }

        /* Container pentru hartă */
        #map { height: 100%; width: 100%; z-index: 1; }
    </style>
</head>
<body>

    <div id="control-panel">
        <a href="#" class="btn btn-cazuri">
            <span class="icon">📋</span>
            Cazuri Speciale
        </a>
        <a href="#" class="btn btn-strazi">
            <span class="icon">🏃</span>
            Toate Străzile
        </a>
        <a href="#" class="btn btn-pagina">
            <span class="icon">🏠</span>
            Pagina Principală
        </a>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // Inițializează harta și setează centrul și zoom-ul
        var map = L.map('map').setView([44.4335, 26.1195], 14); // Coordonate pentru Foisorul de Foc, București

        // Adaugă stratul de hărți de bază (OpenStreetMap)
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Definește poliliniile complexe pentru trasee
        var line1 = L.polyline([
            [44.4350, 26.1140],
            [44.4355, 26.1145],
            [44.4360, 26.1160],
            [44.4370, 26.1165],
            [44.4375, 26.1175]
        ], {color: 'blue', weight: 6, opacity: 0.6}).addTo(map);

        var line2 = L.polyline([
            [44.4310, 26.1110],
            [44.4315, 26.1115],
            [44.4320, 26.1125],
            [44.4330, 26.1130]
        ], {color: 'blue', weight: 6, opacity: 0.6}).addTo(map);

        var line3 = L.polyline([
            [44.4340, 26.1070],
            [44.4345, 26.1075],
            [44.4350, 26.1085],
            [44.4360, 26.1090],
            [44.4365, 26.1100]
        ], {color: 'blue', weight: 6, opacity: 0.6}).addTo(map);

        // Adaugă alte polilinii după cum este necesar
    </script>
</body>
</html>
