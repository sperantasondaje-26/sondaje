 <!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Trasee București</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f6f9; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .grup-butoane {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; width: 95%; max-width: 600px;
        }
        .btn-meniu {
            background-color: #28a745; color: white; padding: 10px 14px; border: none; border-radius: 20px;
            font-weight: bold; font-size: 13px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-decoration: none; text-align: center; display: inline-flex; align-items: center; justify-content: center;
            min-width: 110px; flex: 1;
        }
        .btn-strazi { background-color: #007bff; }
        .btn-inapoi { background-color: #343a40; }

        .container-ecran {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; z-index: 1050; display: none; flex-direction: column; box-sizing: border-box;
        }
        .antet-fereastra { padding: 15px; background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; }
        .antet-fereastra h2 { margin: 0; font-size: 16px; color: #333; }
        .btn-inchide { background-color: #dc3545; color: white; border: none; padding: 8px 14px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .zona-scroll { flex: 1; overflow-y: auto; padding: 12px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #dee2e6; padding: 10px 8px; text-align: left; vertical-align: top; }
        th { background-color: #343a40; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        
        .lista-strazi { list-style-type: none; padding: 0; margin: 0; }
        .lista-strazi li { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #222; display: flex; align-items: center; gap: 8px; }
        .lista-strazi li::before { content: "🛣️"; }
        
        .incarcare { text-align: center; padding: 30px; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <div class="grup-butoane">
        <button class="btn-meniu" onclick="deschideCazuriSecurizat()">📋 Cazuri Speciale</button>
        <button class="btn-meniu btn-strazi" onclick="deschideFereastra('container-strazi')">🚶 Toate Străzile</button>
        <a href="index.html" class="btn-meniu btn-inapoi">🏠 Pagina Principală</a>
    </div>

    <div id="container-tabel" class="container-ecran">
        <div class="antet-fereastra">
            <h2>📋 Cazuri Speciale Semnalate pe Teren</h2>
            <button class="btn-inchide" onclick="inchideToate()">✖ Închide</button>
        </div>
        <div class="zona-scroll">
            <table id="tabel-date">
                <thead>
                    <tr>
                        <th>Echipă</th>
                        <th>Adresă Caz</th>
                        <th>Interese / Nevoi</th>
                        <th>Observații</th>
                    </tr>
                </thead>
                <tbody id="corp-tabel">
                    <tr><td colspan="4" class="incarcare">Se încarcă datele...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="container-strazi" class="container-ecran">
        <div class="antet-fereastra">
            <h2>🚶 Listă Străzi Parcurse (Istoric)</h2>
            <button class="btn-inchide" onclick="inchideToate()">✖ Închide</button>
        </div>
        <div class="zona-scroll">
            <ul id="lista-strazi-parcurse" class="lista-strazi">
                <li class="incarcare">Se generează lista străzilor...</li>
            </ul>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const idTabelGoogle = '1O_XyQKzPOYiYGx7RPgJ-s6wl88c-YCmmUDGCf3RkOuQ'; 
        const urlCsv = `https://docs.google.com/spreadsheets/d/${idTabelGoogle}/export?format=csv&gid=206187394`;
        const parolaCorecta = 'titughejan@2026';

        let harta;
        let straziUniceSet = new Set();

        // 🛣️ TRASEE POLIGONALE PRECISE CE URMEAZĂ STRĂZILE STRAT CUSTOALE DIN BUCUREȘTI
        const traseeStraziLinii = {
            "strada popa nan": [
                [44.43444, 26.12196], [44.43542, 26.12242], [44.43632, 26.12282], 
                [44.43695, 26.12311], [44.43851, 26.12384], [44.44105, 26.12502]
            ],
            "strada traian": [
                [44.42851, 26.11623], [44.43045, 26.11681], [44.43265, 26.11742], 
                [44.43460, 26.11802], [44.43641, 26.11855], [44.43872, 26.11921], 
                [44.44111, 26.11985], [44.44315, 26.12042], [44.44685, 26.12140]
            ],
            "strada tepes voda": [
                [44.43475, 26.11925], [44.43521, 26.12140], [44.43555, 26.12302], [44.43615, 26.12570]
            ],
            "calea calarasilor": [
                [44.43231, 26.10825], [44.43258, 26.11120], [44.43292, 26.11545], 
                [44.43341, 26.12141], [44.43410, 26.12750], [44.43465, 26.13110]
            ],
            "strada labirint": [
                [44.43085, 26.11692], [44.43101, 26.11895], [44.43120, 26.12110]
            ],
            "strada matei basarab": [
                [44.43212, 26.11051], [44.43242, 26.11410], [44.43271, 26.11745], 
                [44.43315, 26.12190], [44.43345, 26.12520]
            ],
            "strada constantin kiritescu": [
                [44.47452, 26.11281], [44.47515, 26.11320], [44.47581, 26.11365]
            ],
            "intrare kiritescu": [
                [44.47501, 26.11302], [44.47532, 26.11331]
            ],
            "strada mantuleasa": [
                [44.43551, 26.11322], [44.43685, 26.11270], [44.43852, 26.11211]
            ],
            "strada parfumului": [
                [44.43182, 26.11451], [44.43255, 26.11512], [44.43322, 26.11581]
            ],
            "bulevardul unirii": [
                [44.42721, 26.09355], [44.42710, 26.10220], [44.42681, 26.11550], 
                [44.42582, 26.12310], [44.42512, 26.12852]
            ],
            "bulevardul decebal": [
                [44.43152, 26.13125], [44.43185, 26.13650], [44.43222, 26.14251]
            ],
            "strada nerva traian": [
                [44.42552, 26.11451], [44.42210, 26.11590], [44.41951, 26.11710], [44.41722, 26.11822]
            ],
            "strada romulus": [
                [44.43052, 26.11355], [44.43285, 26.11260], [44.43491, 26.11185], [44.43652, 26.11122]
            ],
            "strada remus": [
                [44.43021, 26.11222], [44.43125, 26.11185], [44.43222, 26.11151]
            ],
            "strada lucian blaga": [
                [44.42551, 26.12322], [44.42750, 26.12240], [44.42982, 26.12155]
            ],
            "strada theodor sperantia": [
                [44.42821, 26.13222], [44.43010, 26.13850], [44.43252, 26.14551]
            ],
            "strada turturelelor": [
                [44.42752, 26.12255], [44.42510, 26.12360], [44.42322, 26.12451]
            ],
            "strada bradului": [
                [44.42622, 26.12151], [44.42540, 26.12290], [44.42482, 26.12422]
            ],
            "strada foisorului": [
                [44.42151, 26.12422], [44.41910, 26.12610], [44.41652, 26.12851]
            ],
            "calea vitan": [
                [44.42155, 26.12481], [44.41650, 26.12750], [44.41120, 26.13110], [44.40622, 26.13555]
            ],
            "strada dristorului": [
                [44.42782, 26.13455], [44.42350, 26.13680], [44.41821, 26.13955]
            ],
            "strada baba novac": [
                [44.42252, 26.13885], [44.42190, 26.14620], [44.42122, 26.15551]
            ],
            "strada ion minulescu": [
                [44.41752, 26.12121], [44.41490, 26.12450], [44.41151, 26.12855]
            ]
        };

        document.addEventListener("DOMContentLoaded", function() {
            harta = L.map('map').setView([44.4335, 26.1195], 14); // Zoom potrivit direct pe zona de acțiune din poză
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(harta);
            incarcaDateDirect();
        });

        function deschideCazuriSecurizat() {
            let introducere = prompt("Introduceți parola pentru a vizualiza cazurile speciale:");
            if (introducere === parolaCorecta) {
                deschideFereastra('container-tabel');
            } else if (introducere !== null) {
                alert("Parolă incorectă! Accesul a fost refuzat.");
            }
        }

        function deschideFereastra(id) {
            inchideToate();
            document.getElementById(id).style.display = 'flex';
        }
        function inchideToate() {
            document.getElementById('container-tabel').style.display = 'none';
            document.getElementById('container-strazi').style.display = 'none';
        }

        function incarcaDateDirect() {
            fetch(urlCsv)
                .then(response => response.text())
                .then(text => {
                    proceseazaCsvExcel(text);
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('corp-tabel').innerHTML = `<tr><td colspan="4" style="color:red; text-align:center;">Eroare la citirea datelor.</td></tr>`;
                });
        }

        function proceseazaCsvExcel(text) {
            let randuri = text.split(/\r?\n/);
            if(randuri.length === 0) return;

            let antet = randuri[0].split(",").map(h => h.replace(/\s+/g, ' ').trim().toLowerCase());
            
            let idxEchipa = antet.findIndex(el => el.includes("echipa"));
            let idxStrada = antet.findIndex(el => el.includes("strada"));

            let indiciCazuri = [];
            for (let c = 1; c <= 4; c++) {
                indiciCazuri.push({
                    idxAddr: antet.findIndex(el => el.includes("nr") && el.includes("adresa") && el.includes(c.toString())),
                    idxNevoi: antet.findIndex(el => el.includes("descriere") && el.includes("nevoi") && el.includes(c.toString())),
                    idxObs: antet.findIndex(el => el.includes("observatii") && el.includes(c.toString()))
                });
            }

            let corpTabel = document.getElementById('corp-tabel');
            corpTabel.innerHTML = "";
            straziUniceSet.clear();

            let areCazuri = false;

            for (let i = 1; i < randuri.length; i++) {
                if (!randuri[i].trim()) continue;
                
                let celule = randuri[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                
                let echipa = celule[idxEchipa] || "-";
                let strada = celule[idxStrada] || "";

                if (!strada || strada.toLowerCase().includes("alege o strada")) continue;

                let stradaCurata = strada.replace(/,?\s*bucuresti.*$/i, '').trim();
                straziUniceSet.add(stradaCurata);

                indiciCazuri.forEach(caz => {
                    if (caz.idxAddr !== -1 && celule[caz.idxAddr]) {
                        let numarAdresa = celule[caz.idxAddr].trim();
                        let textNevoi = caz.idxNevoi !== -1 ? celule[caz.idxNevoi].trim() : "";
                        let textObs = caz.idxObs !== -1 ? celule[caz.idxObs].trim() : "";

                        if (numarAdresa !== "" && numarAdresa !== "-") {
                            areCazuri = true;
                            let rand = document.createElement('tr');
                            rand.innerHTML = `
                                <td style="font-weight:bold; color:#0056b3;">${echipa}</td>
                                <td>${stradaCurata}, Nr. ${numarAdresa}</td>
                                <td>${textNevoi || "-"}</td>
                                <td style="background-color: #fffdf0; font-style: italic;">${textObs || "-"}</td>
                            `;
                            corpTabel.appendChild(rand);
                        }
                    }
                });
            }

            if (!areCazuri) {
                corpTabel.innerHTML = `<tr><td colspan="4" class="incarcare">Nu sunt cazuri speciale înregistrate.</td></tr>`;
            }

            popeazaListaStrazi();
            deseneazaLiniiPoligonalePrecise();
        }

        function popeazaListaStrazi() {
            const containerLista = document.getElementById('lista-strazi-parcurse');
            containerLista.innerHTML = "";

            if (straziUniceSet.size === 0) {
                containerLista.innerHTML = `<li class="incarcare">Nicio stradă nu a fost parcursă încă.</li>`;
                return;
            }

            let straziSortate = Array.from(straziUniceSet).sort((a, b) => a.localeCompare(b));
            straziSortate.forEach(strada => {
                let li = document.createElement('li');
                li.innerHTML = `<strong>${strada}</strong>`;
                containerLista.appendChild(li);
            });
        }

        function deseneazaLiniiPoligonalePrecise() {
            // Curățăm marcajele vechi de tip linie pentru a redesena curat
            harta.eachLayer(function (layer) {
                if (layer instanceof L.Polyline && !(layer instanceof L.Polygon)) {
                    harta.removeLayer(layer);
                }
            });

            straziUniceSet.forEach(strada => {
                let cheieCautare = strada.toLowerCase().trim();
                
                if (traseeStraziLinii[cheieCautare]) {
                    let punctePoligonale = traseeStraziLinii[cheieCautare];
                    
                    // Desenăm linia poligonală care se mulează perfect pe traseul străzii
                    L.polyline(punctePoligonale, {
                        color: '#0056b3', // Albastru intens
                        weight: 6,        // Grosime optimă pentru străzi pe telefon
                        opacity: 0.85,
                        lineJoin: 'round', // Rotunjește colțurile la intersecții pentru aspect fluid
                        lineCap: 'round'
                    }).addTo(harta).bindPopup(`<b>🛣️ ${strada}</b><br><span style="color:green;font-weight:bold;">Stradă parcursă!</span>`);
                }
            });
        }
    </script>
</body>
</html>
